<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ETERNALGY AI Portal</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --surface: #ffffff;
            --surface-muted: #f8fafc;
            --line: #e2e8f0;
            --line-strong: #cbd5e1;
            --text: #0f172a;
            --text-muted: #64748b;
            --accent: #1d4ed8;
            --accent-soft: #dbeafe;
            --success: #16a34a;
            --danger: #dc2626;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 24px 16px 40px;
            background:
                radial-gradient(circle at 0% 0%, rgba(148, 163, 184, 0.15), transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.1), transparent 45%),
                var(--bg);
            color: var(--text);
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .mobile-header {
            max-width: 1080px;
            margin: 0 auto 18px;
            text-align: center;
        }

        .mobile-header h1 {
            margin: 0;
            font-size: clamp(28px, 5vw, 40px);
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text);
        }

        .mobile-header p {
            margin: 10px 0 0;
            color: var(--text-muted);
            font-size: 15px;
        }

        .mobile-header .sub-note {
            margin-top: 6px;
            font-size: 14px;
            letter-spacing: 0.01em;
        }

        .front-quick-links {
            max-width: 1080px;
            margin: 0 auto 24px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .front-quick-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 18px;
            border-radius: 999px;
            border: 1px solid var(--line-strong);
            background: var(--surface);
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s ease;
        }

        .front-quick-links a:hover {
            border-color: #94a3b8;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
            transform: translateY(-1px);
        }

        .card-container {
            max-width: 1080px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .category-section {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 16px 34px rgba(15, 23, 42, 0.06);
        }

        .category-header {
            margin: 0 0 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 650;
            color: var(--text);
        }

        .category-header img {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 6px;
            background: var(--surface-muted);
            padding: 2px;
        }

        .category-cards {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .mobile-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: 0.2s ease;
        }

        .mobile-card:hover {
            border-color: var(--line-strong);
            box-shadow: 0 10px 22px rgba(15, 23, 42, 0.08);
            transform: translateY(-1px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.35;
            color: var(--text);
        }

        .card-badge {
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 11px;
            letter-spacing: 0.03em;
            font-weight: 700;
            color: #1e40af;
            background: var(--accent-soft);
            border: 1px solid #bfdbfe;
            white-space: nowrap;
        }

        .card-status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-idle .status-dot {
            background: var(--success);
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.15);
        }

        .status-busy .status-dot {
            background: var(--danger);
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.14);
        }

        .card-btn {
            width: 100%;
            border: 1px solid #1e3a8a;
            border-radius: 10px;
            background: linear-gradient(180deg, #2563eb, #1d4ed8);
            color: #ffffff;
            padding: 10px 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .card-btn:hover {
            filter: brightness(1.02);
            box-shadow: 0 8px 20px rgba(29, 78, 216, 0.25);
        }

        .card-btn:active {
            transform: translateY(1px);
        }

        .loading-container {
            text-align: center;
            padding: 56px 20px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            box-shadow: 0 14px 28px rgba(15, 23, 42, 0.05);
        }

        .spinner {
            width: 34px;
            height: 34px;
            border: 3px solid #dbeafe;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.45;
        }

        .session-warning {
            margin: 0 0 16px;
            border: 1px solid #fecaca;
            background: #fff7f7;
            color: #9f1239;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 13px;
            line-height: 1.45;
        }

        .session-warning strong {
            color: #7f1d1d;
        }

        @media (max-width: 520px) {
            body {
                padding: 18px 12px 28px;
            }

            .category-section {
                padding: 14px;
            }

            .card-badge {
                font-size: 10px;
            }
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.2s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 24px 48px rgba(15, 23, 42, 0.12);
            transform: translateY(10px);
            transition: 0.2s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-title {
            margin: 0 0 12px 0;
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }

        .modal-body {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .modal-textarea {
            width: 100%;
            height: 120px;
            border: 1px solid var(--line-strong);
            border-radius: 12px;
            padding: 12px;
            font-family: inherit;
            font-size: 13px;
            resize: vertical;
            margin-bottom: 20px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .modal-btn {
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
            border: none;
        }

        .modal-btn-cancel {
            background: var(--surface-muted);
            color: var(--text-muted);
            border: 1px solid var(--line);
        }

        .modal-btn-save {
            background: var(--accent);
            color: #fff;
        }

        .modal-btn:hover {
            filter: brightness(1.05);
        }
    </style>
</head>

<body>
    <div class="mobile-header">
        <h1>ETERNALGY AI Portal</h1>
        <p>[ CHAT MEMORY IS STORED AND SHARED ]</p>
        <p class="sub-note">[ NO USERNAME / PASSWORD REQUIRED ]</p>
    </div>

    <div id="mobile-cards" class="card-container">
        <div class="loading-container">
            <div class="spinner"></div>
            <div class="loading-text">Loading sessions…<br><span
                    style="font-size: 13px; color: #64748b; margin-top: 5px; display: block;">Fetching AI
                    Instances</span></div>
        </div>
    </div>

    <script>
        (async function () {



            // ─── Helpers ─────────────────────────────────────────────────────────────
            function setLoadingMsg(line1, line2) {
                const el = document.querySelector('#mobile-cards .loading-text');
                if (!el) return;
                el.innerHTML = line1 + (line2 ? '<br><span style="font-size:13px;color:#64748b;margin-top:5px;display:block">' + line2 + '</span>' : '');
            }
            function escapeHtml(s) {
                return String(s == null ? '' : s)
                    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            }

            // ─── 1. Wait for Puppeteer deferred login if applicable ───────────────────
            async function waitForSession() {
                const s = await fetch('/api/chesspnt-client-session', { cache: 'no-store' })
                    .then(r => r.json()).catch(() => ({}));
                if (!s.puppeteerWanted) return;
                setLoadingMsg('ChessPNT login in progress…', 'The server is signing in with Puppeteer. This page will continue automatically.');
                const deadline = Date.now() + 120000;
                while (Date.now() < deadline) {
                    const s2 = await fetch('/api/chesspnt-client-session', { cache: 'no-store' })
                        .then(r => r.json()).catch(() => ({}));
                    if (s2.lastPuppeteerOkAt) return;
                    if (s2.puppeteerLastFailure && !s2.puppeteerLoginInFlight) {
                        setLoadingMsg('Login did not complete.', 'Continuing with last session. Check GET /health for details.');
                        return;
                    }
                    await new Promise(r => setTimeout(r, 2000));
                }
            }
            await waitForSession();

            // ─── 2. Category config ───────────────────────────────────────────────────
            const CATEGORIES = [
                { name: 'ChatGPT', displayName: 'ChatGPT PRO [拼车]', logo: 'chatgpt.png', apiKey: 'sass', nodeType: 'sass' },
                { name: 'Gemini', displayName: 'Gemini Ultra [拼车]', logo: 'gemini.png', apiKey: 'gemini', nodeType: 'gemini' },
                { name: 'Grok', displayName: 'Grok Pro [拼车]', logo: 'grok.png', apiKey: 'grok', nodeType: 'grok' },
                { name: 'Claude', displayName: 'Claude Pro [拼车]', logo: 'claude.png', apiKey: 'claude', nodeType: 'claude' },
                { name: 'Perplexity', displayName: 'Perplexity Pro [独享]', logo: 'perplexity.png', isDirect: true, url: 'https://v.tuangouai.com/#/', token: 'perplexity-30-10-cdk|706323' },
                { name: 'Qwen', displayName: 'QWEN [官方免费]', logo: 'qwen.png', isDirect: true, url: 'https://chat.qwen.ai/' },
            ];

            const allInstances = {
                ChatGPT: [], Gemini: [], Grok: [], Claude: [],
                Perplexity: [{ carID: 'direct', title: 'Perplexity Pro [独享]', status: 'Idle', badge: 'Direct', isDirect: true, url: 'https://v.tuangouai.com/#/', token: 'perplexity-30-10-cdk|706323' }],
                Qwen: [{ carID: 'direct', title: 'QWEN [官方免费]', status: 'Idle', badge: 'Official', isDirect: true, url: 'https://chat.qwen.ai/' }],
            };

            const container = document.getElementById('mobile-cards');
            let isConnecting = false;

            // ─── 3. Render ────────────────────────────────────────────────────────────
            let lastJson = '';
            function renderUI() {
                const stateJson = JSON.stringify(allInstances);
                if (stateJson === lastJson) return;
                lastJson = stateJson;

                const chessEmpty = ['ChatGPT', 'Gemini', 'Grok', 'Claude'].every(k => !allInstances[k] || !allInstances[k].length);
                let html = '';
                if (chessEmpty) {
                    html += `<div class="session-warning"><strong>ChessPNT sessions not loaded.</strong>
                    ChatGPT / Gemini / Grok / Claude require a live <code>chat.chesspnt.com</code> session.
                    Only direct cards are showing. Check <code>GET /health</code> for details.</div>`;
                }
                CATEGORIES.forEach(cat => {
                    const cards = allInstances[cat.name];
                    if (!cards || !cards.length) return;
                    html += `<div class="category-section">
                    <h2 class="category-header"><img src="/images/${cat.logo}" alt="${escapeHtml(cat.displayName || cat.name)}"> ${escapeHtml(cat.displayName || cat.name)}</h2>
                    <div class="category-cards">`;
                    cards.slice(0, 6).forEach(card => {
                        const direct = card.isDirect || false;
                        html += `<div class="mobile-card"
                            data-car-id="${escapeHtml(card.carID || '')}"
                            data-node-type="${escapeHtml(card.nodeType || cat.nodeType || '')}"
                            data-is-plus="${card.isPlus || 0}"
                            data-direct="${direct}"
                            data-url="${escapeHtml(card.url || '')}"
                            data-token="${escapeHtml(card.token || '')}">
                        <div class="card-header">
                            <div class="card-title">${escapeHtml(card.title)}</div>
                            <div class="card-badge">${escapeHtml(card.badge)}</div>
                        </div>
                        <div class="card-status status-${(card.status || 'idle').toLowerCase()}">
                            <div class="status-dot"></div>
                            <span>READY</span>
                        </div>
                        <button type="button" class="card-btn">${direct ? 'Open Instance' : 'Connect Session'}</button>
                    </div>`;
                    });
                    html += `</div></div>`;
                });
                container.innerHTML = html;
            }

            // Show direct cards right away
            renderUI();

            // ─── 4. Fetch real session cards from server API ──────────────────────────
            setLoadingMsg('Loading sessions…', 'Fetching AI instances from ChessPNT…');
            try {
                const data = await fetch('/api/cards', { cache: 'no-store' }).then(r => r.json());
                if (data.ok) {
                    if (data.sass && data.sass.length) allInstances.ChatGPT = data.sass;
                    if (data.gemini && data.gemini.length) allInstances.Gemini = data.gemini;
                    if (data.grok && data.grok.length) allInstances.Grok = data.grok;
                    if (data.claude && data.claude.length) allInstances.Claude = data.claude;
                    // Fallback: use plus cards for ChatGPT if sass is empty
                    if (!allInstances.ChatGPT.length && data.plus && data.plus.length) {
                        allInstances.ChatGPT = data.plus.map(c => ({ ...c, nodeType: 'plus' }));
                    }
                } else {
                    console.warn('[ChessGPT-Portal] /api/cards error:', data.error);
                }
            } catch (e) {
                console.warn('[ChessGPT-Portal] Failed to fetch /api/cards:', e.message);
            }
            renderUI();

            // ─── 5. Click handler ─────────────────────────────────────────────────────
            container.addEventListener('click', async (e) => {
                let t = e.target;
                if (t && t.nodeType !== 1) t = t.parentElement;
                const btn = t && typeof t.closest === 'function' ? t.closest('.card-btn') : null;
                if (!btn) return;
                const card = btn.closest('.mobile-card');
                if (!card) return;
                if (isConnecting) { console.info('[ChessGPT-Portal] Busy, please wait.'); return; }

                isConnecting = true;
                const direct = card.getAttribute('data-direct') === 'true';
                const url = card.getAttribute('data-url');
                const token = card.getAttribute('data-token');
                const carID = card.getAttribute('data-car-id');
                const nodeType = card.getAttribute('data-node-type');
                const isPlus = parseInt(card.getAttribute('data-is-plus') || '0', 10);

                // ── Direct-access cards (DeepSeek / Perplexity / Qwen) ────────────────
                if (direct) {
                    if (token) {
                        try { await navigator.clipboard.writeText(token); } catch (_) {
                            const tmp = document.createElement('input');
                            tmp.value = token; document.body.appendChild(tmp); tmp.select();
                            document.execCommand('copy'); document.body.removeChild(tmp);
                        }
                        btn.textContent = 'Token Copied & Opening…';
                    } else {
                        btn.textContent = 'Opening…';
                    }
                    setTimeout(() => { window.open(url, '_blank'); btn.textContent = 'Open Instance'; isConnecting = false; }, 600);
                    return;
                }

                // ── ChessPNT session via server-side API ──────────────────────────────
                btn.textContent = 'Connecting…';
                console.info('[ChessGPT-Portal] Calling /api/connect-session', { carID, nodeType, isPlus });
                try {
                    const res = await fetch('/api/connect-session', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ carID, nodeType, planType: isPlus }),
                    });
                    const data = await res.json();
                    console.info('[ChessGPT-Portal] connect-session →', data);
                    if (data.ok && data.url) {
                        btn.textContent = 'Session Opened!';
                        window.open(data.url, '_blank');
                    } else {
                        btn.textContent = 'Error – see console';
                        console.error('[ChessGPT-Portal] connect-session failed:', data);
                    }
                } catch (err) {
                    btn.textContent = 'Error – see console';
                    console.error('[ChessGPT-Portal] connect-session exception:', err);
                } finally {
                    setTimeout(() => { btn.textContent = 'Connect Session'; isConnecting = false; }, 3000);
                }
            });

        })();
    </script>

    <details id="diag-wrap"
        style="display:none;max-width:960px;margin:20px auto;padding:0 16px 40px;box-sizing:border-box;color:#94a3b8;font-size:12px;">
        <summary style="cursor:pointer;color:#cbd5e1;font-weight:600;">Server diagnostics (same data as GET /health)
        </summary>
        <pre id="diag-pre"
            style="white-space:pre-wrap;word-break:break-word;background:#0b1220;padding:14px;border-radius:10px;border:1px solid #334155;margin-top:10px;color:#e2e8f0;font-size:11px;line-height:1.4;"></pre>
    </details>


    <script>
        (function () {
            fetch('/health').then(r => r.json()).then(h => {
                const wrap = document.getElementById('diag-wrap');
                const pre = document.getElementById('diag-pre');
                if (!wrap || !pre) return;
                const show = h.puppeteerLastFailure || h.proxyChesspntLastFailure || h.proxyQwenLastFailure;
                if (show) {
                    pre.textContent = JSON.stringify({ puppeteerLastFailure: h.puppeteerLastFailure, proxyChesspntLastFailure: h.proxyChesspntLastFailure, proxyQwenLastFailure: h.proxyQwenLastFailure }, null, 2);
                    wrap.style.display = 'block';
                }
            }).catch(err => console.warn('/health fetch failed', err));

        })();
    </script>
</body>

</html>
