<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team AI Portal</title>
    <style>
        :root {
            --bg: #0f111a;
            --card-bg: #1c1f2e;
            --accent: #4facfe;
            --accent-glow: #00f2fe;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        body { background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; box-sizing: border-box; min-height: 100vh; }
        .mobile-header { text-align: center; margin-bottom: 30px; padding-top: 10px; }
        .mobile-header h1 { font-size: 32px; margin: 0; background: linear-gradient(135deg, var(--accent-glow), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; letter-spacing: -0.5px; }
        .card-container { display: flex; flex-direction: column; gap: 30px; padding-bottom: 40px; max-width: 500px; margin: 0 auto; }
        .category-section { background: rgba(28, 31, 46, 0.4); border: 1px solid #2a2d3e; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .category-header { display: flex; align-items: center; gap: 12px; font-size: 22px; font-weight: 800; margin: 0 0 20px 0; color: var(--text); border-bottom: 1px solid #2a2d3e; padding-bottom: 12px; }
        .category-header img { width: 28px; height: 28px; object-fit: contain; border-radius: 6px; }
        .category-cards { display: flex; flex-direction: column; gap: 12px; }
        .mobile-card { background: var(--card-bg); border: 1px solid #2a2d3e; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 12px; transition: all 0.2s ease; }
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-size: 18px; font-weight: 700; color: var(--text); }
        .card-badge { background: rgba(79, 172, 254, 0.15); padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
        .card-status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); font-weight: 500; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-idle .status-dot { background: #4ade80; box-shadow: 0 0 10px rgba(74, 222, 128, 0.5); }
        .status-busy .status-dot { background: #f87171; box-shadow: 0 0 10px rgba(248, 113, 113, 0.5); }
        .card-btn { background: linear-gradient(135deg, var(--accent), var(--accent-glow)); color: #fff; border: none; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; width: 100%; box-sizing: border-box; transition: opacity 0.2s; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3); }
        .card-btn:active { opacity: 0.8; }
        .loading-container { text-align: center; padding: 50px 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #8a93a6; font-size: 16px; font-weight: 500; line-height: 1.5; }
        #dashboard-frame { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
        .session-warning { max-width: 500px; margin: 0 auto 24px; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(248, 113, 113, 0.35); background: rgba(248, 113, 113, 0.08); color: #fecaca; font-size: 14px; line-height: 1.45; }
        .session-warning strong { color: #fff; }
        .front-quick-links { max-width: 500px; margin: -12px auto 22px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; padding: 0 8px; box-sizing: border-box; }
        .front-quick-links a { display: inline-flex; align-items: center; justify-content: center; padding: 12px 22px; border-radius: 12px; font-weight: 700; font-size: 15px; text-decoration: none; color: #fff; background: linear-gradient(135deg, #4f7cfd 0%, #6366f1 100%); box-shadow: 0 4px 14px rgba(99, 102, 241, 0.32); border: 1px solid rgba(255,255,255,0.12); }
        .front-quick-links a:hover { filter: brightness(1.06); }
        .front-quick-links a:active { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="mobile-header"><h1>Team Portal</h1></div>
    <nav class="front-quick-links" aria-label="Quick links">
        <a href="/deepseek/" target="_blank" rel="noopener noreferrer">Open DeepSeek</a>
    </nav>
    <div id="mobile-cards" class="card-container">
        <div class="loading-container">
            <div class="spinner"></div>
            <div class="loading-text">Authenticating & Syncing...<br><span style="font-size: 13px; color: #64748b; margin-top: 5px; display: block;">Fetching AI Instances</span></div>
        </div>
    </div>
    <iframe id="dashboard-frame" style="display:none;"></iframe>
    <script>
        (async function () {
        function applyClientSession(ls, cookieHeader) {
            const obj = ls && typeof ls === 'object' ? ls : {};
            for (const key in obj) {
                try { localStorage.setItem(key, obj[key]); } catch (e) { console.warn('localStorage set', key, e); }
            }
            const ch = typeof cookieHeader === 'string' ? cookieHeader : '';
            ch.split('; ').forEach(function (c) { if (c) document.cookie = c + '; path=/; max-age=2592000'; });
        }
        function setPortalLoadingMessage(line1, line2) {
            const el = document.querySelector('#mobile-cards .loading-text');
            if (!el) return;
            el.innerHTML = line1 + (line2 ? '<br><span style="font-size:13px;color:#64748b;margin-top:5px;display:block">' + line2 + '</span>' : '');
        }
        async function waitForDeferredPuppeteerLogin() {
            if (!window.WRAPPER_WAIT_FOR_PUPPETEER) {
                applyClientSession(window.INJECTED_LS || {}, window.INJECTED_COOKIES || '');
                return;
            }
            setPortalLoadingMessage('ChessPNT login in progress…', 'The server is signing in with Puppeteer (often 30–90s on a cold start). This page will continue automatically—no refresh needed.');
            const deadline = Date.now() + 120000;
            while (Date.now() < deadline) {
                const s = await fetch('/api/chesspnt-client-session', { cache: 'no-store' }).then(function (r) { return r.json(); });
                if (s.lastPuppeteerOkAt) {
                    applyClientSession(s.localStorage || {}, s.cookieHeader || '');
                    return;
                }
                if (s.puppeteerLastFailure && !s.puppeteerLoginInFlight) {
                    applyClientSession(s.localStorage || {}, s.cookieHeader || '');
                    setPortalLoadingMessage('ChessPNT login did not complete.', 'See GET /health or Server diagnostics below. Continuing with the last server session.');
                    return;
                }
                await new Promise(function (r) { setTimeout(r, 1500); });
            }
            const s = await fetch('/api/chesspnt-client-session', { cache: 'no-store' }).then(function (r) { return r.json(); });
            applyClientSession(s.localStorage || {}, s.cookieHeader || '');
            setPortalLoadingMessage('Still waiting on ChessPNT session.', 'If cards stay empty, reload once or check GET /health.');
        }

        await waitForDeferredPuppeteerLogin();

        const cardsContainer = document.getElementById('mobile-cards');
        const iframe = document.getElementById('dashboard-frame');
        iframe.src = '/list/#/home';
        
        const categories = [
            { name: 'ChatGPT', target: 'Claude+GPT', logo: 'chatgpt.png' },
            { name: 'Gemini', target: 'Gemini', logo: 'gemini.png' },
            { name: 'Grok', target: 'Grok', logo: 'grok.png' },
            { name: 'Claude', target: 'Claude主通道', logo: 'claude.png' },
            { name: 'DeepSeek', target: 'DeepSeek', logo: 'deepseek.png', isDirect: true, url: '/deepseek/' },
            { name: 'Perplexity', target: 'Perplexity', logo: 'perplexity.png', isDirect: true, url: 'https://v.tuangouai.com/#/', token: 'perplexity-30-10-cdk|706323' },
            { name: 'Qwen', target: 'Qwen-AI', logo: 'qwen.png', isDirect: true, url: 'https://chat.qwen.ai/' }
        ];
        const allInstances = {
            'ChatGPT': [], 'Gemini': [], 'Grok': [], 'Claude': [],
            'DeepSeek': [{ id: 'DeepSeek-Proxy', title: 'DeepSeek (team session)', status: 'Idle', badge: 'Team', target: 'DeepSeek', isDirect: true, url: '/deepseek/' }],
            'Perplexity': [{ id: 'Perplexity-Pro', title: 'Perplexity Pro', status: 'Idle', badge: 'Pro', target: 'Perplexity', isDirect: true, url: 'https://v.tuangouai.com/#/', token: 'perplexity-30-10-cdk|706323' }],
            'Qwen': [{ id: 'Qwen-Direct', title: 'Qwen Max / Turbo', status: 'Idle', badge: 'Team', target: 'Qwen-AI', isDirect: true, url: 'https://chat.qwen.ai/' }]
        };
        let currentCatIndex = 0;
        let isConnecting = false;

        cardsContainer.addEventListener('click', (e) => {
            if (e.target.classList.contains('card-btn')) {
                if (isConnecting) return;
                isConnecting = true;
                const btn = e.target;
                const cardEl = btn.closest('.mobile-card');
                const targetCat = cardEl.getAttribute('data-target');
                const title = cardEl.getAttribute('data-title');
                const isDirect = cardEl.getAttribute('data-direct') === 'true';
                
                if (isDirect) {
                    const url = cardEl.getAttribute('data-url');
                    const token = cardEl.getAttribute('data-token');
                    if (token) {
                        const tempInput = document.createElement('input');
                        tempInput.value = token;
                        document.body.appendChild(tempInput);
                        tempInput.select();
                        document.execCommand('copy');
                        document.body.removeChild(tempInput);
                        btn.textContent = "Token Copied & Opening...";
                    } else {
                        btn.textContent = "Opening " + targetCat + "...";
                    }
                    setTimeout(() => { 
                        window.open(url, '_blank'); 
                        btn.textContent = "Connect Session"; 
                        isConnecting = false; 
                    }, 800);
                    return;
                }
                
                btn.textContent = "Connecting...";
                try {
                    const doc = iframe.contentDocument || iframe.contentWindow.document;
                    if (doc) {
                        const spans = Array.from(doc.querySelectorAll('span, div, a'));
                        const targetEl = spans.find(s => s.textContent.includes(targetCat));
                        if (targetEl) targetEl.click();
                    }
                } catch(err) { console.warn("Switch failed", err); }
                
                let attempts = 0;
                const poll = setInterval(() => {
                    attempts++;
                    try {
                        const doc = iframe.contentDocument || iframe.contentWindow.document;
                        if (!doc) return;
                        const allDivs = Array.from(doc.querySelectorAll('div, h3, span, p'));
                        const instanceEl = allDivs.find(el => el.textContent.trim() === title);
                        if (instanceEl) {
                            clearInterval(poll);
                            let container = instanceEl.parentElement;
                            for(let i=0; i<4; i++) {
                                if(container && (container.textContent.includes('Sass') || container.textContent.includes('Plus') || container.textContent.includes('Pro'))) {
                                    container.click();
                                    const link = container.querySelector('a, button');
                                    if(link) link.click();
                                    btn.textContent = "Session Opened!";
                                    setTimeout(() => { isConnecting = false; btn.textContent = "Connect Session"; }, 3000);
                                    break;
                                }
                                container = container.parentElement;
                            }
                        } else if (attempts > 30) { clearInterval(poll); btn.textContent = "Error"; setTimeout(() => { isConnecting = false; }, 2000); }
                    } catch(err) { console.warn("Poll failed", err); }
                }, 100);
            }
        });

        iframe.onload = () => {
            setInterval(() => {
                if (isConnecting) return;
                const currentCat = categories[currentCatIndex];
                if (currentCat.isDirect) { currentCatIndex = (currentCatIndex + 1) % categories.length; return; }
                try {
                    const doc = iframe.contentDocument || iframe.contentWindow.document;
                    if (!doc) return;
                    const spans = Array.from(doc.querySelectorAll('span, div, a'));
                    const targetEl = spans.find(s => s.textContent.includes(currentCat.target));
                    if (targetEl) targetEl.click();
                } catch(err) {}
                setTimeout(() => {
                    if (isConnecting) return;
                    try {
                        const doc = iframe.contentDocument || iframe.contentWindow.document;
                        if (!doc) return;
                        const allDivs = Array.from(doc.querySelectorAll('div'));
                        const sassBadges = allDivs.filter(d => d.textContent.trim() === 'Sass' || d.textContent.trim() === 'Plus' || d.textContent.trim() === 'Pro');
                        const cardsData = [];
                        sassBadges.forEach(badge => {
                            let container = badge.parentElement;
                            for (let i = 0; i < 6; i++) {
                                if (!container) break;
                                const text = container.textContent || '';
                                if (text.includes('Claude Code') || text.includes('大画家')) break;
                                if ((text.includes('Idle') || text.includes('Busy')) && text.includes('Recommended')) {
                                    let title = 'Instance';
                                    const possibleTitles = Array.from(container.querySelectorAll('div, h3, span, p')).filter(el => el.textContent.length >= 3 && el.textContent.length < 25 && el !== badge);
                                    if (possibleTitles.length > 0) { title = possibleTitles[0].textContent.trim().replace('Sass', '').replace('Plus', '').replace('Pro', '').trim(); }
                                    if (title.includes('Recommended') || title.includes('Idle')) continue;
                                    cardsData.push({ id: title, title: title, status: text.includes('Idle') ? 'Idle' : 'Busy', badge: badge.textContent.trim(), target: currentCat.target });
                                    break;
                                }
                                container = container.parentElement;
                            }
                        });
                        if (cardsData.length > 0) {
                            const uniqueCards = []; const seen = new Set();
                            for(let c of cardsData) { if(!seen.has(c.id)) { seen.add(c.id); uniqueCards.push(c); } }
                            allInstances[currentCat.name] = uniqueCards.slice(0, 5);
                        }
                        currentCatIndex = (currentCatIndex + 1) % categories.length;
                        renderUI();
                    } catch (e) {}
                }, 800);
            }, 2500);
        };

        let lastRenderedJson = '';
        function escapeHtml(str) {
            return String(str == null ? '' : str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        function renderUI() {
            if (allInstances['ChatGPT'].length === 0 && allInstances['Gemini'].length === 0 && allInstances['Grok'].length === 0 && allInstances['Claude'].length === 0 && allInstances['Qwen'].length === 0 && allInstances['DeepSeek'].length === 0 && allInstances['Perplexity'].length === 0) return;
            const stateJson = JSON.stringify(allInstances);
            if (stateJson === lastRenderedJson) return;
            lastRenderedJson = stateJson;
            let html = '';
            const chessBackedKeys = ['ChatGPT', 'Gemini', 'Grok', 'Claude'];
            const chessBackedEmpty = chessBackedKeys.every((k) => !allInstances[k] || allInstances[k].length === 0);
            if (chessBackedEmpty) {
                html += `
                    <div class="session-warning">
                        <strong>ChessPNT session not loading.</strong>
                        ChatGPT / Gemini / Grok / Claude cards come from a logged-in <code>chat.chesspnt.com</code> session.
                        If you only see DeepSeek, Perplexity, and Qwen, the ChessPNT session failed — set
                        <code>CHESSPNT_USE_PUPPETEER=1</code> with <code>CHESSPNT_USERNAME</code> / <code>CHESSPNT_PASSWORD</code> (or <code>CHESSGPT_*</code> aliases), or refresh cookies on the volume.
                        When Puppeteer is enabled, this page <strong>waits</strong> for server-side login before loading the ChessPNT iframe (so you are not racing a 30–90s login). When something breaks, see <code>GET /health</code> and the <strong>Server diagnostics</strong> section below for full errors (<code>stack</code>, <code>causeChain</code>, etc.).
                        If it worked on <strong>localhost</strong> but fails on <strong>Railway</strong>, the wrapper must reach ChessPNT from the datacenter (different IP than your home). Open <code>GET /api/probe-chesspnt-outbound</code> on the same host — <code>ok:true</code> means egress works; <code>ok:false</code> is a network/upstream block, not CORS in the browser.
                    </div>`;
            }
            categories.forEach(cat => {
                const cards = allInstances[cat.name];
                if (cards && cards.length > 0) {
                    html += `
                        <div class="category-section">
                            <h2 class="category-header">
                                <img src="/images/${cat.logo}" alt="logo">
                                ${cat.name}
                            </h2>
                            <div class="category-cards">
                    `;
                    cards.forEach(card => {
                        html += `
                            <div class="mobile-card" 
                                 data-title="${escapeHtml(card.title)}" 
                                 data-target="${escapeHtml(card.target)}"
                                 data-direct="${card.isDirect || false}"
                                 data-url="${escapeHtml(card.url || '')}"
                                 data-token="${escapeHtml(card.token || '')}">
                                <div class="card-header">
                                    <div class="card-title">${escapeHtml(card.title)}</div>
                                    <div class="card-badge">${escapeHtml(card.badge)}</div>
                                </div>
                                <div class="card-status status-${card.status.toLowerCase()}">
                                    <div class="status-dot"></div>
                                    <span>${card.status} - ${card.isDirect ? 'Direct Access' : 'Recommended'}</span>
                                </div>
                                <button class="card-btn">${card.isDirect ? 'Open Instance' : 'Connect Session'}</button>
                            </div>
                        `;
                    });
                    html += `</div></div>`;
                }
            });
            cardsContainer.innerHTML = html;
        }
        renderUI();
        })();
    </script>
    <details id="diag-wrap" style="display:none;max-width:960px;margin:20px auto;padding:0 16px 40px;box-sizing:border-box;color:#94a3b8;font-size:12px;">
        <summary style="cursor:pointer;color:#cbd5e1;font-weight:600;">Server diagnostics (same data as GET /health)</summary>
        <pre id="diag-pre" style="white-space:pre-wrap;word-break:break-word;background:#0b1220;padding:14px;border-radius:10px;border:1px solid #334155;margin-top:10px;color:#e2e8f0;font-size:11px;line-height:1.4;"></pre>
    </details>
    <script>
        (function () {
            fetch('/health')
                .then(function (r) { return r.json(); })
                .then(function (h) {
                    var wrap = document.getElementById('diag-wrap');
                    var pre = document.getElementById('diag-pre');
                    if (!wrap || !pre) return;
                    var show = h.puppeteerLastFailure || h.proxyChesspntLastFailure || h.proxyQwenLastFailure || h.proxyDeepseekLastFailure;
                    if (show) {
                        pre.textContent = JSON.stringify(
                            {
                                puppeteerLastFailure: h.puppeteerLastFailure,
                                proxyChesspntLastFailure: h.proxyChesspntLastFailure,
                                proxyQwenLastFailure: h.proxyQwenLastFailure,
                                proxyDeepseekLastFailure: h.proxyDeepseekLastFailure,
                            },
                            null,
                            2
                        );
                        wrap.style.display = 'block';
                    }
                })
                .catch(function (err) {
                    console.warn('/health fetch failed', err);
                });
        })();
    </script>
</body>
</html>
